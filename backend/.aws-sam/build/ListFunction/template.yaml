AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DnD Character Builder backend

Parameters:
  DmPasswordHash:
    Type: String
    NoEcho: true
    Description: bcrypt hash of the DM master password (stored in SSM at /dnd/dm-password-hash)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    CodeUri: ./
    Environment:
      Variables:
        TABLE_NAME: !Ref CharactersTable
        PORTRAITS_BUCKET: !Ref PortraitsBucket
        DM_PASSWORD_HASH: !Ref DmPasswordHash

Resources:

  # ── API ──────────────────────────────────────────────────────────────────────
  CharactersApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - x-character-password
          - x-session-token
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS

  # ── DynamoDB ─────────────────────────────────────────────────────────────────
  CharactersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dnd-characters
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: slug
          KeyType: HASH

  # ── S3 portraits ─────────────────────────────────────────────────────────────
  PortraitsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: hunkz-dnd-portraits
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedHeaders: ["*"]
            MaxAge: 3000

  PortraitsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PortraitsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${PortraitsBucket.Arn}/portraits/*"

  # ── Lambda functions ──────────────────────────────────────────────────────────
  ListFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/list.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref CharactersApi
            Path: /characters
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CharactersTable

  GetFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref CharactersApi
            Path: /characters/{slug}
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CharactersTable

  CreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/create.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref CharactersApi
            Path: /characters
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CharactersTable

  UpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/update.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref CharactersApi
            Path: /characters/{slug}
            Method: PUT
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CharactersTable

  DeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/delete.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref CharactersApi
            Path: /characters/{slug}
            Method: DELETE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CharactersTable

  VerifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/verify.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref CharactersApi
            Path: /characters/{slug}/verify
            Method: POST
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CharactersTable

  PortraitUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/portrait.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref CharactersApi
            Path: /characters/{slug}/portrait-url
            Method: POST
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CharactersTable
        - S3WritePolicy:
            BucketName: !Ref PortraitsBucket

  SessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/session.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /characters/{slug}/session
            Method: patch
            ApiId: !Ref CharactersApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CharactersTable

  DmPartyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/dmParty.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /dm/party
            Method: get
            ApiId: !Ref CharactersApi
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CharactersTable

  InitiativeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/initiative.handler
      Events:
        GetApi:
          Type: HttpApi
          Properties:
            Path: /initiative
            Method: get
            ApiId: !Ref CharactersApi
        PutApi:
          Type: HttpApi
          Properties:
            Path: /initiative
            Method: put
            ApiId: !Ref CharactersApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CharactersTable

  GetNpcCombatFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getNpcCombat.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /npc-combat
            Method: get
            ApiId: !Ref CharactersApi
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CharactersTable

  PutNpcCombatFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/putNpcCombat.handler
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /npc-combat
            Method: put
            ApiId: !Ref CharactersApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CharactersTable

Outputs:
  ApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${CharactersApi}.execute-api.${AWS::Region}.amazonaws.com"
  PortraitsBucketName:
    Value: !Ref PortraitsBucket
